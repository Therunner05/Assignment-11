name: Automated Output Testing

on: [push]

jobs:
  test-application:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Test Case 1 (10 Numbers - Expected: 1.0)
        run: |
          python find_lowest_number.py test1_input.txt actual1.txt
          echo "1.0" | diff actual1.txt -

      - name: Test Case 2 (1 Number - Expected: 42.0)
        run: |
          python find_lowest_number.py test2_input.txt actual2.txt
          echo "42.0" | diff actual2.txt -

      - name: Test Case 3 (Blank File)
        run: |
          python find_lowest_number.py test3_input.txt actual3.txt
          echo "No numbers found in file" | diff actual3.txt -

